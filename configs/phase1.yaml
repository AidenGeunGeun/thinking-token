{
  "experiment": {
    "name": "phase1-exploration",
    "benchmark": "tau2-bench",
    "domain": "telecom",
    "task_split": "base",
    "tasks_file": "configs/phase1_tasks.json",
    "results_dir": "results/phase1",
    "task_subset": 10,
    "trials": 1
  },
  "models": [
    {
      "hf_repo": "unsloth/Qwen3.5-2B-GGUF",
      "hf_file": "Qwen3.5-2B-Q8_0.gguf",
      "short_name": "qwen35-2b"
    },
    {
      "hf_repo": "unsloth/Qwen3.5-4B-GGUF",
      "hf_file": "Qwen3.5-4B-Q8_0.gguf",
      "short_name": "qwen35-4b"
    },
    {
      "hf_repo": "unsloth/Qwen3.5-9B-GGUF",
      "hf_file": "Qwen3.5-9B-Q8_0.gguf",
      "short_name": "qwen35-9b"
    }
  ],
  "conditions": [
    {
      "name": "thinking_off",
      "enable_thinking": false,
      "retention_strategy": "strip_all",
      "summarize_thinking": false
    },
    {
      "name": "strip_all",
      "enable_thinking": true,
      "retention_strategy": "strip_all",
      "summarize_thinking": false
    },
    {
      "name": "raw_window3",
      "enable_thinking": true,
      "retention_strategy": "window_3",
      "summarize_thinking": false
    },
    {
      "name": "raw_retain",
      "enable_thinking": true,
      "retention_strategy": "retain_all",
      "summarize_thinking": false
    },
    {
      "name": "summary_window3",
      "enable_thinking": true,
      "retention_strategy": "window_3",
      "summarize_thinking": true
    },
    {
      "name": "summary_retain",
      "enable_thinking": true,
      "retention_strategy": "retain_all",
      "summarize_thinking": true
    }
  ],
  "user_sim": {
    "model": "xiaomi/mimo-v2-flash",
    "provider": "openrouter"
  },
  "summarizer": {
    "model": "openrouter/xiaomi/mimo-v2-flash",
    "prompt": "You are an AI assistant mid-task. Below is what happened in your last turn:\n\nCUSTOMER MESSAGE:\n{user_message}\n\nYOUR REASONING:\n{thinking_text}\n\nYOUR RESPONSE:\n{response_text}\n\nCondense your reasoning into natural first-person thought — the way you think to yourself while working through a problem. Write as yourself: direct, flowing, \"I checked their account...\", \"I need to ask them to...\". No headers, bullet points, or formal structure. Length proportional to the original reasoning."
  },
  "generation": {
    "max_tokens": 8192,
    "turn_delay_seconds": 0.0
  },
  "llama": {
    "base_args": "--jinja --flash-attn on --n-gpu-layers 99 --ctx-size 131072 --cache-type-k q8_0 --cache-type-v q8_0 --reasoning-format none --chat-template-file configs/chat_template.jinja",
    "port": 8080
  }
}
