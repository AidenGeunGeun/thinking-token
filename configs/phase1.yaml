{
  "experiment": {
    "name": "phase1-exploration",
    "benchmark": "tau2-bench",
    "domain": "telecom",
    "task_split": "base",
    "task_subset": 10,
    "trials": 1
  },
  "models": [
    {
      "hf_repo": "unsloth/Qwen3.5-0.8B-GGUF",
      "hf_file": "Qwen3.5-0.8B-Q4_K_M.gguf",
      "short_name": "qwen35-0.8b"
    },
    {
      "hf_repo": "unsloth/Qwen3.5-4B-GGUF",
      "hf_file": "Qwen3.5-4B-Q4_K_M.gguf",
      "short_name": "qwen35-4b"
    },
    {
      "hf_repo": "unsloth/Qwen3.5-9B-GGUF",
      "hf_file": "Qwen3.5-9B-Q4_K_M.gguf",
      "short_name": "qwen35-9b"
    }
  ],
  "conditions": [
    {
      "name": "thinking_off",
      "enable_thinking": false,
      "retention_strategy": "strip_all",
      "summarize_thinking": false
    },
    {
      "name": "strip_all",
      "enable_thinking": true,
      "retention_strategy": "strip_all",
      "summarize_thinking": false
    },
    {
      "name": "window_3",
      "enable_thinking": true,
      "retention_strategy": "window_3",
      "summarize_thinking": true
    },
    {
      "name": "retain_all",
      "enable_thinking": true,
      "retention_strategy": "retain_all",
      "summarize_thinking": true
    }
  ],
  "user_sim": {
    "model": "openai/gpt-oss-20b",
    "provider": "groq"
  },
  "summarizer": {
    "model": "groq/openai/gpt-oss-20b",
    "prompt": "Distill the following reasoning trace into a concise internal note. Capture: what was being decided, what information was used, and what conclusion was reached. The note should be proportional in length to the original reasoning — longer reasoning gets a longer summary, short reasoning gets a brief summary. This note will be provided to the model in future turns as context for its prior reasoning.\n\nReasoning trace:\n{thinking_text}"
  },
  "generation": {
    "max_tokens": 8192
  },
  "llama": {
    "base_args": "--jinja --flash-attn on --n-gpu-layers 99 --ctx-size 131072 --reasoning-format none --chat-template-file configs/chat_template.jinja",
    "port": 8080
  }
}
